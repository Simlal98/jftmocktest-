<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>जापान दूधालु गाई MCQ क्विज - १०० प्रश्न</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #ecf0f1;
        }

        .quiz-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        body.dark-mode .quiz-container {
            background: rgba(52, 73, 94, 0.95);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        body.dark-mode .header h1 {
            color: #ecf0f1;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timer {
            font-size: 1.5em;
            font-weight: bold;
            color: #e74c3c;
            min-width: 80px;
        }

        body.dark-mode .timer {
            color: #e74c3c;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .dark-toggle {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .dark-toggle:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-number {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
            margin-bottom: 15px;
        }

        body.dark-mode .question-number {
            background: #2980b9;
        }

        .question {
            font-size: 1.3em;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        body.dark-mode .question {
            color: #ecf0f1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .option {
            background: #34495e;
            border-color: #4a5f77;
            color: #ecf0f1;
        }

        .option:hover {
            background: #e3f2fd;
            border-color: #2196f3;
            transform: translateX(5px);
        }

        body.dark-mode .option:hover {
            background: #4a5f77;
            border-color: #3498db;
        }

        .option.selected {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .option.correct {
            background: #27ae60;
            color: white;
            border-color: #229954;
        }

        .option.wrong {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            text-align: center;
            padding: 40px 20px;
        }

        .score {
            font-size: 4em;
            font-weight: 800;
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .score-text {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        body.dark-mode .score-text {
            color: #ecf0f1;
        }

        .review-btn {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .question {
                font-size: 1.1em;
            }

            .controls {
                flex-direction: column;
                gap: 15px;
            }

            .progress-bar {
                order: -1;
                width: 100%;
            }
        }

        .hidden {
            display: none !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 0.6s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="quiz-container" id="quizContainer">
        <div class="header">

            <p>१०० प्रश्नहरूबाट १० सेकेन्डको टाइमर सहितको क्विज</p>
        </div>

        <div class="controls">
            <div class="timer" id="timer">10</div>

        <div class="question-container" id="questionContainer">
            <!-- Questions will be loaded here -->
        </div>

        <div class="nav-buttons" id="navButtons">
            <!-- Navigation buttons will be loaded here -->
        </div>

        <div class="result-container hidden" id="resultContainer">
            <!-- Results will be shown here -->
        </div>
    </div>

        // Quiz state
        let currentQuestion = 0;
        let score = 0;
        let timer = 10;
        let timerInterval;
        let shuffledQuestions = [];
        let userAnswers = [];
        let isDarkMode = false;
        let gameEnded = false;

        // DOM elements
        const quizContainer = document.getElementById('quizContainer');
        const questionContainer = document.getElementById('questionContainer');
        const navButtons = document.getElementById('navButtons');
        const resultContainer = document.getElementById('resultContainer');
        const timerEl = document.getElementById('timer');
        const progressFill = document.getElementById('progressFill');
        const darkToggle = document.getElementById('darkToggle');

        // Audio context for sound effects
        let audioContext;

        // Initialize quiz
        function initQuiz() {
            shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
            userAnswers = new Array(shuffledQuestions.length).fill(null);
            currentQuestion = 0;
            score = 0;
            gameEnded = false;
            showQuestion();
            startTimer();
        }

        // Show current question
        function showQuestion() {
            if (currentQuestion >= shuffledQuestions.length) {
                endQuiz();
                return;
            }

            const q = shuffledQuestions[currentQuestion];
            questionContainer.innerHTML = `
                <div class="question-number">प्रश्न ${currentQuestion + 1} / ${shuffledQuestions.length}</div>
                <div class="question">${q.question}</div>
                <div class="options" id="options"></div>
            `;

            const optionsEl = document.getElementById('options');
            q.options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.textContent = option;
                optionEl.addEventListener('click', () => selectOption(index));
                optionsEl.appendChild(optionEl);
            });

            updateProgress();
            updateNavButtons();
            highlightUserAnswer();
        }

        // Select option
        function selectOption(index) {
            if (gameEnded || userAnswers[currentQuestion] !== null) return;

            userAnswers[currentQuestion] = index;
            document.querySelectorAll('#options .option').forEach((el, i) => {
                el.classList.remove('selected');
                if (i === index) el.classList.add('selected');
            });
            clearInterval(timerInterval);
        }

        // Timer functions
        function startTimer() {
            timer = 10;
            timerEl.textContent = timer;
            timerInterval = setInterval(() => {
                timer--;
                timerEl.textContent = timer;
                timerEl.classList.add('pulse');

                if (timer <= 0) {
                    clearInterval(timerInterval);
                    if (userAnswers[currentQuestion] === null) {
                        userAnswers[currentQuestion] = -1; // No answer
                    }
                    nextQuestion();
                }
            }, 1000);
        }

        // Next question
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < shuffledQuestions.length) {
                showQuestion();
                startTimer();
            } else {
                endQuiz();
            }
        }

        // Previous question
        function prevQuestion() {
            clearInterval(timerInterval);
            currentQuestion--;
            showQuestion();
            startTimer();
        }

        // Update progress bar
        function updateProgress() {
            const progress = ((currentQuestion + 1) / shuffledQuestions.length) * 100;
            progressFill.style.width = progress + '%';
        }

        // Update navigation buttons
        function updateNavButtons() {
            navButtons.innerHTML = `
                <button class="btn btn-secondary ${currentQuestion === 0 ? 'hidden' : ''}" id="prevBtn">अघिल्लो</button>
                <button class="btn btn-primary" id="nextBtn">अर्को</button>
            `;

            document.getElementById('nextBtn').addEventListener('click', nextQuestion);
            const prevBtn = document.getElementById('prevBtn');
            if (prevBtn) {
                prevBtn.addEventListener('click', prevQuestion);
            }
        }

        // Highlight user's previous answer
        function highlightUserAnswer() {
            const userAnswer = userAnswers[currentQuestion];
            if (userAnswer !== null) {
                document.querySelectorAll('#options .option')[userAnswer].classList.add('selected');
            }
        }

        // End quiz and show results
        function endQuiz() {
            gameEnded = true;
            clearInterval(timerInterval);
            
            // Calculate final score
            score = userAnswers.reduce((total, answer, index) => {
                return total + (answer === shuffledQuestions[index].answer ? 1 : 0);
            }, 0);

            questionContainer.classList.add('hidden');
            navButtons.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            resultContainer.innerHTML = `
                <div class="score">${score}/${shuffledQuestions.length}</div>
                <div class="score-text">अभिनन्दन! तपाईंको स्कोर ${Math.round((score/shuffledQuestions.length)*100)}%</div>
                <button class="btn btn-primary review-btn" onclick="reviewAnswers()">जवाफहरू हेर्नुहोस्</button>
                <button class="btn btn-secondary review-btn" onclick="initQuiz()" style="margin-left: 10px;">फेरि खेल्नुहोस्</button>
            `;
        }

        // Review answers
        function reviewAnswers() {
            resultContainer.innerHTML = '<div class="question" style="margin-bottom: 30px;">सबै प्रश्नहरूको समीक्षा गर्नुहोस्</div>';
            shuffledQuestions.forEach((q, index) => {
                const userAnswer = userAnswers[index];
                const isCorrect = userAnswer === q.answer;
                const div = document.createElement('div');
                div.className = 'question-container';
                div.style.marginBottom = '25px';
                div.innerHTML = `
                    <div class="question-number">प्रश्न ${index + 1}</div>
                    <div class="question">${q.question}</div>
                    <div style="font-weight: bold; color: ${isCorrect ? '#27ae60' : '#e74c3c'}; margin-bottom: 10px; font-size: 1.1em;">
                        ${isCorrect ? '✅ सही जवाफ' : '❌ गलत जवाफ'} 
                        ${userAnswer === -1 ? '(समय सकियो - जवाफ दिइएन)' : `तपाईंको छनोट: "${q.options[userAnswer]}"`}
                        ${!isCorrect ? `<br><span style="color: #27ae60;">सही जवाफ: "${q.options[q.answer]}"</span>` : ''}
                    </div>
                `;
                resultContainer.appendChild(div);
            });
            const restartBtn = document.createElement('button');
            restartBtn.className = 'btn btn-primary review-btn';
            restartBtn.style.marginTop = '30px';
            restartBtn.textContent = 'नयाँ खेल सुरु गर्नुहोस्';
            restartBtn.onclick = initQuiz;
            resultContainer.appendChild(restartBtn);
        }

        // Sound effects
        function playSound(frequency, duration, type = 'sine') {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // Dark mode toggle
        darkToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            darkToggle.textContent = isDarkMode ? '☀️' : '🌙';
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                document.querySelector('.option.selected') ? nextQuestion() : null;
            }
            if (e.key === 'ArrowLeft' && currentQuestion > 0) {
                prevQuestion();
            }
            if (e.key === 'ArrowRight') {
                nextQuestion();
            }
        });

        // Start quiz
        initQuiz();
    </script>
</body>
</html>
