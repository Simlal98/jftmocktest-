.scorelbl{font-size:13px;color:var(--color-text-secondary);font-weight:500}

.pbar{width:100%;height:5px;background:var(--color-background-secondary);border-radius:3px;margin-bottom:1rem;overflow:hidden}
.pfill{height:100%;background:#bc002d;border-radius:3px;transition:width .4s ease}
.trow{display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
.tsvg{width:44px;height:44px;flex-shrink:0}

.obtn:disabled{cursor:default}
.obtn.correct{border-color:#1D9E75!important;background:#E1F5EE!important;color:#085041!important}
.obtn.wrong{border-color:#D85A30!important;background:#FAECE7!important;color:#4A1B0C!important}
.olbl{width:22px;height:22px;min-width:22px;border-radius:50%;border:0.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--color-text-secondary)}
.obtn.correct .olbl{background:#1D9E75;border-color:#1D9E75;color:#fff}
.obtn.wrong .olbl{background:#D85A30;border-color:#D85A30;color:#fff}
.fb{margin-top:.75rem;padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s}

.fb.ok{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
.fb.ng{background:#FAECE7;color:#4A1B0C;border:0.5px solid #D85A30}
.fb.to{background:#FAEEDA;color:#412402;border:0.5px solid #EF9F27}

.qanim{animation:si .28s ease}

.ressub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem}

["पानी भरेको खेतमा सिधै बीउ रोप्दा के प्रयोग गरिन्छ?",["सामान्य बीउ","क्याल्सियम पेरोक्साइड वा आइरनले कोटिङ गरिएको बीउ","प्लास्टिकको बीउ"],1],

["बदाम (Peanut) को फल कहाँ बन्छ?",["हावामा","जमिनमुनि","पातमा"],1]

const TOTAL=ALL.length;
let qs=[],idx=0,score=0,wrong=0,tos=0,answered=false,tv=12,ti=null,dark=false;

function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function init(){
  qs=sh(ALL).map(q=>{
    const cor=q[1][q[2]];
    const so=sh([...q[1]]);
    return{q:q[0],opts:so,cor:so.indexOf(cor)};
  });
  idx=0;score=0;wrong=0;tos=0;answered=false;
  render();
}

function snd(t){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    if(t==='ok'){
      o.type='sine';
      o.frequency.setValueAtTime(523,c.currentTime);
      o.frequency.setValueAtTime(659,c.currentTime+0.1);
      o.frequency.setValueAtTime(784,c.currentTime+0.2);
      g.gain.setValueAtTime(0.25,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);
      o.start();o.stop(c.currentTime+0.5);
    }else{
      o.type='sawtooth';
      o.frequency.setValueAtTime(220,c.currentTime);
      o.frequency.setValueAtTime(160,c.currentTime+0.15);
      g.gain.setValueAtTime(0.2,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
      o.start();o.stop(c.currentTime+0.4);
    }
  }catch(e){}
}

function startT(){
  clearInterval(ti);tv=12;updT();
  ti=setInterval(()=>{tv--;updT();if(tv<=0){clearInterval(ti);autoFail();}},1000);
}

function updT(){
  const s=document.getElementById('tsvg');
  const n=document.getElementById('tnum');
  if(!s||!n)return;
  const r=18,circ=2*Math.PI*r;
  const col=tv>5?'#bc002d':tv>2?'#EF9F27':'#D85A30';
  s.style.strokeDasharray=`${circ*(tv/12)} ${circ}`;
  s.style.stroke=col;
  n.textContent=tv;n.style.fill=col;
}

function autoFail(){
  if(answered)return;
  answered=true;tos++;
  snd('ng');
  const q=qs[idx];
  document.querySelectorAll('.obtn').forEach((b,i)=>{b.disabled=true;if(i===q.cor)b.classList.add('correct');});
  const fb=document.getElementById('fb');
  fb.className='fb to show';fb.textContent='समय सकियो! सही उत्तर माथि हेर्नुहोस्।';
  document.getElementById('nb').style.display='inline-block';
}

function pick(i){
  if(answered)return;
  answered=true;clearInterval(ti);
  const q=qs[idx];
  document.querySelectorAll('.obtn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  if(i===q.cor){score++;snd('ok');document.querySelectorAll('.obtn')[i].classList.add('correct');fb.className='fb ok show';fb.textContent='सही छ!';}
  else{wrong++;snd('ng');document.querySelectorAll('.obtn')[i].classList.add('wrong');document.querySelectorAll('.obtn')[q.cor].classList.add('correct');fb.className='fb ng show';fb.textContent='गलत! सही उत्तर माथि हेर्नुहोस्।';}
  document.getElementById('nb').style.display='inline-block';
}

function next(){
  idx++;answered=false;
  if(idx>=TOTAL){showRes();return;}
  render();
}

function grade(p){
  if(p>=90)return['S — उत्कृष्ट!','grade-s'];
  if(p>=75)return['A — राम्रो!','grade-a'];
  if(p>=60)return['B — ठीकै छ','grade-b'];
  return['C — अझ अभ्यास गर्नुहोस्','grade-c'];
}

function showRes(){
  clearInterval(ti);
  const pct=Math.round(score/TOTAL*100);
  const [gmsg,gcls]=grade(pct);
  document.getElementById('app').innerHTML=`<div class="res qanim">
    <div class="res-flag"><div class="jp-circle"></div><span style="font-size:14px;color:#bc002d;font-weight:500">Way to Japan</span></div>
    <h2>परीक्षा सम्पन्न!</h2>
    <div class="bigscore">${score}/${TOTAL}</div>
    <div class="grade-badge ${gcls}">${gmsg}</div>
    <p class="ressub">${pct}% सही उत्तर</p>
    <div class="statrow">
      <div class="statcard"><div class="statval" style="color:#1D9E75">${score}</div><div class="statlbl">सही</div></div>
      <div class="statcard"><div class="statval" style="color:#D85A30">${wrong}</div><div class="statlbl">गलत</div></div>
      <div class="statcard"><div class="statval" style="color:#EF9F27">${tos}</div><div class="statlbl">समय सकियो</div></div>
    </div>
    <button class="rbtn" onclick="init()">फेरि सुरु गर्नुहोस्</button>
  </div>`;
}

function toggleDark(){
  dark=!dark;
  const app=document.getElementById('app');
  app.style.background=dark?'#181818':'';
  app.style.borderRadius=dark?'12px':'';
  app.style.padding=dark?'1rem':'1rem 0';
  render();
}

function render(){
  const q=qs[idx];
  const ls=['A','B','C'];
  const pct=Math.round(idx/TOTAL*100);
  document.getElementById('app').innerHTML=`
    <div class="top-header qanim">
      <div class="jp-flag"><div class="jp-circle"></div><span class="jp-txt">Way to Japan — कृषि परीक्षा</span></div>
    </div>
    <div class="hdr">
      <div class="scorelbl">स्कोर: ${score}/${idx} &nbsp;|&nbsp; ${idx+1}/${TOTAL}</div>
      <button class="dbtn" onclick="toggleDark()">${dark?'☀ Light':'◑ Dark'}</button>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="trow">
      <svg class="tsvg" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="var(--color-border-tertiary)" stroke-width="3"/>
        <circle id="tsvg" cx="22" cy="22" r="18" fill="none" stroke="#bc002d" stroke-width="3"
          stroke-linecap="round" transform="rotate(-90 22 22)"
          style="transition:stroke-dasharray 0.85s linear;stroke-dasharray:113 113"/>
        <text id="tnum" x="22" y="27" text-anchor="middle" font-size="13" font-weight="500" fill="#bc002d">${tv}</text>
      </svg>
      <div class="tmeta">
        <div class="tnum-lbl">प्रश्न ${idx+1} / ${TOTAL}</div>
        <div class="tsub">१२ सेकेन्ड बाँकी</div>
      </div>
    </div>
    <div class="qtxt qanim">${q.q}</div>
    <div class="opts qanim">
      ${q.opts.map((o,i)=>`<button class="obtn" onclick="pick(${i})"><span class="olbl">${ls[i]}</span>${o}</button>`).join('')}
    </div>
    <div class="fb" id="fb"></div>
    <button class="nxtbtn" id="nb" onclick="next()">${idx+1<TOTAL?'अर्को प्रश्न →':'नतिजा हेर्नुहोस् →'}</button>
  `;
  if(dark){
    document.getElementById('app').style.background='#181818';
    document.getElementById('app').style.borderRadius='12px';
    document.getElementById('app').style.padding='1rem';
    document.querySelectorAll('.obtn').forEach(b=>{b.style.background='#242424';b.style.color='#ddd';b.style.borderColor='#3a3a3a';});
  }
  startT();
}

init();
</script>
