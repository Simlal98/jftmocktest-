<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कृषि MCQ क्विज - Agriculture Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #ecf0f1;
        }

        .quiz-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        body.dark-mode .quiz-container {
            background: #2c3e50;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-container {
            padding: 40px 30px;
        }

        .question-number {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 600;
        }

        body.dark-mode .question-number {
            color: #bdc3c7;
        }

        .question {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
            color: #2c3e50;
        }

        body.dark-mode .question {
            color: #ecf0f1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            background: white;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .option {
            border-color: #34495e;
            background: #34495e;
            color: #ecf0f1;
        }

        .option:hover {
            border-color: #4facfe;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2);
        }

        .option.selected {
            border-color: #4facfe;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .option.correct {
            border-color: #51cf66;
            background: linear-gradient(135deg, #51cf66, #40c057);
            color: white;
        }

        .option.wrong {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #ff6b6b, #ff5252);
            color: white;
        }

        .timer {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .result-container {
            padding: 60px 40px;
            text-align: center;
        }

        .score {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score.perfect {
            background: linear-gradient(135deg, #51cf66, #40c057);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .restart-btn {
            padding: 18px 50px;
            font-size: 18px;
            margin-top: 30px;
        }

        .dark-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        body.dark-mode .dark-toggle {
            background: rgba(0,0,0,0.8);
            color: white;
        }

        .dark-toggle:hover {
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            .question {
                font-size: 20px;
            }
            
            .question-container {
                padding: 30px 20px;
            }
            
            .controls {
                flex-direction: column;
            }
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        body.dark-mode .feedback.correct {
            background: #2d5a3a;
            color: #c3e6cb;
        }

        body.dark-mode .feedback.wrong {
            background: #5a2d3a;
            color: #f5c6cb;
        }
    </style>
</head>
<body>
    <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
    
    <div class="quiz-container" id="quizContainer">
        <div class="header">
            <h1>🌾 कृषि MCQ क्विज</h1>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div>प्रश्न <span id="currentQuestion">1</span> / <span id="totalQuestions">100</span></div>
            <div id="scoreDisplay" style="display: none;">स्कोर: <span id="currentScore">0</span></div>
        </div>

        <div id="questionScreen">
            <div class="question-container">
                <div class="question-number" id="questionNumber"></div>
                <div class="question" id="question"></div>
                
                <div class="options" id="options"></div>
                
                <div class="feedback" id="feedback"></div>
                
                <div class="controls">
                    <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()" disabled>अघिल्लो</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">अर्को</button>
                </div>
            </div>
        </div>

        <div id="resultScreen" style="display: none;">
            <div class="result-container">
                <div class="score" id="finalScore">0</div>
                <div style="font-size: 24px; margin-bottom: 20px; color: #666;">
                    कुल <span id="totalScore">100</span> मा
                </div>
                <div style="font-size: 18px; margin-bottom: 30px; color: #888;">
                    बधाई हो! तपाईंको प्रदर्शन राम्रो छ।
                </div>
                <button class="btn btn-primary restart-btn" onclick="restartQuiz()">फेरि सुरु गर्नुहोस्</button>
            </div>
        </div>
    </div>

                question: "फलफूलको रूखको 'डोरमेन्सी' (Dormancy) तोड्न के आवश्यक हुन्छ?",
                options: ["उच्च तापक्रम", "कम तापक्रम (चिसो)", "धेरै पानी"],
                answer: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answers = {};
        let timer;
        let timeLeft = 10;
        let shuffledQuestions = [];

        const correctSound = document.getElementById('correctSound');
        const wrongSound = document.getElementById('wrongSound');

        function init() {
            shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            score = 0;
            answers = {};
            timeLeft = 10;
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestionIndex >= shuffledQuestions.length) {
                showResult();
                return;
            }

            const q = shuffledQuestions[currentQuestionIndex];
            document.getElementById('questionNumber').textContent = `प्रश्न ${currentQuestionIndex + 1}: (${q.id})`;
            document.getElementById('question').textContent = q.question;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = shuffledQuestions.length;
            document.getElementById('scoreDisplay').style.display = 'none';

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.innerHTML = `<span class="timer" id="timer${currentQuestionIndex}">${timeLeft}s</span>${option}`;
                optionEl.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionEl);
            });

            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').textContent = currentQuestionIndex === shuffledQuestions.length - 1 ? 'समाप्त' : 'अर्को';
            document.getElementById('feedback').style.display = 'none';

            updateProgress();
            startTimer();
        }

        function selectOption(selectedIndex) {
            clearInterval(timer);
            const q = shuffledQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, index) => {
                opt.classList.remove('selected', 'correct', 'wrong');
                if (index === q.answer) {
                    opt.classList.add('correct');
                } else if (index === selectedIndex && index !== q.answer) {
                    opt.classList.add('wrong');
                }
                opt.style.pointerEvents = 'none';
            });

            if (selectedIndex === q.answer) {
                if (!answers[q.id]) {
                    score++;
                    answers[q.id] = true;
                    playSound(correctSound);
                }
            } else {
                answers[q.id] = false;
                playSound(wrongSound);
            }

            document.getElementById('currentScore').textContent = score;
            showFeedback(selectedIndex === q.answer);
        }

        function showFeedback(isCorrect) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = isCorrect ? '✅ सही उत्तर!' : '❌ गलत उत्तर!';
            feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            feedback.style.display = 'block';
        }

        function startTimer() {
            timeLeft = 10;
            updateTimerDisplay();
            
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    autoNext();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById(`timer${currentQuestionIndex}`);
            if (timerEl) {
                timerEl.textContent = `${timeLeft}s`;
                timerEl.style.color = timeLeft <= 3 ? '#ff4757' : '#ff6b6b';
            }
        }

        function autoNext() {
            const q = shuffledQuestions[currentQuestionIndex];
            if (!answers[q.id]) {
                answers[q.id] = false;
                showFeedback(false);
                playSound(wrongSound);
            }
            setTimeout(nextQuestion, 1500);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex) / shuffledQuestions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function showResult() {
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            const percentage = Math.round((score / shuffledQuestions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}`;
            document.getElementById('totalScore').textContent = shuffledQuestions.length;
            
            const scoreEl = document.getElementById('finalScore');
            if (percentage >= 80) {
                scoreEl.textContent += ' 🎉';
                scoreEl.classList.add('perfect');
            }
            
            document.querySelector('.result-container div[style*="font-size: 24px"]').textContent = 
                `कुल ${shuffledQuestions.length} मा ${score} सही (${percentage}%)`;
        }

        function restartQuiz() {
            document.getElementById('questionScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            init();
        }

        function playSound(sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log('Sound play failed:', e));
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('.dark-toggle');
            icon.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        // Initialize quiz
        init();
    </script>
</body>
</html>
