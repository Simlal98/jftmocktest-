<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कृषि विज्ञान प्रश्नोत्तर - Agriculture Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #ecf0f1;
        }

        .quiz-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        body.dark-mode .quiz-container {
            background: rgba(52, 73, 94, 0.95);
            color: #ecf0f1;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            width: 0%;
            transition: width 0.3s ease;
        }

        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }

        .dark-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .dark-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .question-container {
            padding: 40px 30px;
            height: calc(100vh - 250px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        body.dark-mode .question {
            color: #ecf0f1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 18px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            background: white;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .option {
            background: #34495e;
            border-color: #5a6c7d;
            color: #ecf0f1;
        }

        .option:hover {
            border-color: #4facfe;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .option.selected {
            border-color: #4facfe;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .option.correct {
            border-color: #00b894;
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
        }

        .option.wrong {
            border-color: #e17055;
            background: linear-gradient(135deg, #e17055, #fdcb6e);
            color: white;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #e1e8ed;
        }

        body.dark-mode .navigation {
            border-top-color: #5a6c7d;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            margin: 0 10px;
        }

        .prev-btn {
            background: #95a5a6;
            color: white;
        }

        .next-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            text-align: center;
            padding: 60px 40px;
        }

        .score {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .score-text {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        body.dark-mode .score-text {
            color: #ecf0f1;
        }

        .restart-btn {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 184, 148, 0.4);
        }

        .question-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #6c757d;
        }

        body.dark-mode .question-info {
            background: #5a6c7d;
            color: #bdc3c7;
        }

        @media (max-width: 600px) {
            .quiz-container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 1.4rem;
            }
            
            .question-container {
                padding: 30px 20px;
            }
            
            .question {
                font-size: 1.1rem;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .navigation {
                flex-direction: column;
            }
            
            .nav-btn {
                margin: 5px 0;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

            {q: "१५८. स्टेपल्याडर प्रयोग गर्दा स्टपर (चेन वा हुक) ठीकसँग लगाउनुपर्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१५९. धानको बीउ रोप्नु अघि 90 दिन जति पानीमा डुबाएर राख्नुपर्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},

            {q: "१६१. धानको बीउमा टुसा 1 मिमि जति निस्केको अवस्थालाई \"परेवाको छाती\" भनिन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१६२. बेना उमार्ने बक्सको लम्बाइ 70 सेमि र चौडाइ 30 सेमि हुन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "\"१६३. \"कलिलो बेना\" बन्न 5-10 दिन लाग्छ।\"", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१६४. \"मध्यम बेना\" बन्न 30-35 दिन लाग्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१६५. खेत रोप्दा लाइनबीच 30 सेमि दूरी राखिन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},

            {q: "१६९. बाला निस्केको 10-20 दिनमा बाली सङ्कलनको समय हुन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१७०. कम्बाइन भनेको धान काट्ने र धान कुट्ने दुवै एउटैमा समेटिएको मेसिन हो।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},

            {q: "१७३. सिधै बीउ रोपेर धान खेती गर्ने विधिलाई डाइरेक्ट सिडिङ भनिन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१७४. पातलो खेती विधिमा बीउ र बेना उमार्ने सामग्रीको लागत बढी हुन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१७५. धान WCS भनेको धानको पूरै बाला, डाँठ र पातबाट बनाइएको साइलेज हो।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१७६. पशुको खाद्य पदार्थ बनाउने चामलको बिक्री मूल्य मुख्य खानाको चामल भन्दा बढी हुन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१७७. गेडागुठी जातिमा गहुँ, जौ, राई, ओट्स पर्छन्।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१७८. काँचो खाने तरकारीमा सखरखण्ड र अदुवा पर्छन्।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१७९. जापानमा लगभग 50 किसिमका तरकारीहरू खेती गरिन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१८०. कुकुरबिटासी समूहमा गोलभाँडा, भन्टा, भेण्डेखुर्सानी पर्छन्।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१८१. प्याज र हरियो प्याज लिलीएसी समूहमा पर्छन्।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१८२. पात खाने तरकारीहरूलाई कन्दमूल तरकारी भनिन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१८३. बन्दाकोबी शीतल मौसममा उपयुक्त हुन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१८४. बन्दाकोबीलाई काँचो खान मात्र प्रयोग गरिन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१८५. चाइनिज बन्दाकोबी (हाकुसाइ) उच्च तापक्रममा राम्रोसँग हुर्किन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१८६. लेटसको बीउले प्रकाश मन पराउँछ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१८७. पालुङ्गोको पातको उचाइ 40 सेमि जति भएपछि बाली सङ्कलन गर्नुपर्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१८८. चिया र उखु औद्योगिक बाली हुन्।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१८९. पशुको खाद्य पदार्थ बनाउने बिरुवालाई घरपालुवा पशुपन्छीको आहाराको रूपमा प्रयोग गरिन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१९०. साइलेज बनाउन हावा पस्ने वातावरण अवश्यक हुन्छ।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१९१. बिरुवाको किसिम अनुसार बिरुवा हुर्कने उपयुक्त तापक्रमको दायरा फरक हुन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१९२. जापानी धनियाँ र जापानी अदुवा उच्च प्रकाशमा राम्रोसँग हुर्किन्छन्।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१९३. पानीको मात्रा कम भएमा बिरुवा ओइलाउँछ र पोषक तत्त्वको कमी हुन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१९४. माटोको पानीको उचित मात्रा 10-20% हो।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१९५. गाजर र लेटस प्रकाशमा उम्रने बीउ हुन्।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१९६. मूला र गोलभाँडा प्रकाशमा उम्रने बीउ हुन्।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"},
            {q: "१९७. बारामाकी, सूक्ष्ममाकी र तेनमाकी गरी तीन विधिले बीउ रोपिन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१९८. स्ट्रबेरी वनस्पतिक प्रजनन गरिन्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "१९९. काँक्रो एकलिङ्गी फूल हुनाले पर-पराग सेचन गर्छ।", a: "A. सही", b: "B. गलत", correct: "A", answer: "A (सही)"},
            {q: "२००. गोदावरी एक वर्षे बिरुवा हो।", a: "A. सही", b: "B. गलत", correct: "B", answer: "B (गलत)"}
        ];

        let shuffledQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = [];
        let timerInterval;
        let timeLeft = 10;
        let isAnswered = false;

        const elements = {
            quizArea: document.getElementById('quizArea'),
            resultArea: document.getElementById('resultArea'),
            timer: document.getElementById('timer'),
            progress: document.getElementById('progress'),
            currentQuestion: document.getElementById('currentQuestion'),
            totalQuestions: document.getElementById('totalQuestions'),
            darkToggle: document.getElementById('darkToggle')
        };

        const sounds = {
            correct: document.getElementById('correctSound'),
            wrong: document.getElementById('wrongSound')
        };

        // Initialize quiz
        function initQuiz() {
            shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = new Array(shuffledQuestions.length).fill(null);
            isAnswered = false;
            showQuestion();
            document.getElementById('totalQuestions').textContent = shuffledQuestions.length;
        }

        function showQuestion() {
            const question = shuffledQuestions[currentQuestionIndex];
            elements.quizArea.innerHTML = `
                <div class="question-info">
                    प्रश्न नम्बर: ${currentQuestionIndex + 1}
                </div>
                <div class="question">${question.q}</div>
                <div class="options" id="options">
                    <div class="option" data-value="A">${question.a}</div>
                    <div class="option" data-value="B">${question.b}</div>
                </div>
                <div class="navigation">
                    <button class="nav-btn prev-btn" id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>अघिल्लो</button>
                    <button class="nav-btn next-btn" id="nextBtn">अर्को</button>
                </div>
            `;

            // Add event listeners
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', () => selectOption(option));
            });

            document.getElementById('prevBtn').addEventListener('click', previousQuestion);
            document.getElementById('nextBtn').addEventListener('click', nextQuestion);

            // Show previous answer if exists
            if (userAnswers[currentQuestionIndex]) {
                const prevOption = document.querySelector(`[data-value="${userAnswers[currentQuestionIndex]}"]`);
                if (prevOption) prevOption.classList.add('selected');
                isAnswered = true;
            }

            startTimer();
            updateProgress();
        }

        function selectOption(option) {
            if (isAnswered) return;

            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected', 'correct', 'wrong');
            });

            option.classList.add('selected');
            const selectedValue = option.dataset.value;
            userAnswers[currentQuestionIndex] = selectedValue;
            isAnswered = true;

            // Show correct answer after brief delay
            setTimeout(() => {
                const correctOption = document.querySelector(`[data-value="${shuffledQuestions[currentQuestionIndex].correct}"]`);
                const selectedOption = document.querySelector('.selected');
                
                correctOption.classList.add('correct');
                
                if (selectedValue !== shuffledQuestions[currentQuestionIndex].correct) {
                    selectedOption.classList.add('wrong');
                } else {
                    score++;
                    playSound('correct');
                }
                
                if (selectedValue !== shuffledQuestions[currentQuestionIndex].correct) {
                    playSound('wrong');
                }
            }, 500);
        }

        function startTimer() {
            timeLeft = 10;
            elements.timer.textContent = timeLeft;
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                elements.timer.textContent = timeLeft;
                
                if (timeLeft <= 3) {
                    elements.timer.style.color = '#ff4757';
                } else {
                    elements.timer.style.color = 'white';
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (!isAnswered) {
                        nextQuestion();
                    }
                }
            }, 1000);
        }

        function nextQuestion() {
            clearInterval(timerInterval);
            if (currentQuestionIndex < shuffledQuestions.length - 1) {
                currentQuestionIndex++;
                isAnswered = false;
                showQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            clearInterval(timerInterval);
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                isAnswered = false;
                showQuestion();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / shuffledQuestions.length) * 100;
            elements.progress.style.width = progress + '%';
            elements.currentQuestion.textContent = currentQuestionIndex + 1;
        }

        function showResults() {
            elements.quizArea.classList.add('hidden');
            elements.resultArea.classList.remove('hidden');
            elements.resultArea.innerHTML = `
                <div class="score">${score}/${shuffledQuestions.length}</div>
                <div class="score-text">तपाईंको अंक: ${Math.round((score/shuffledQuestions.length)*100)}%</div>
                <button class="restart-btn" onclick="initQuiz()">फेरि सुरु गर्नुहोस्</button>
            `;
        }

        function playSound(type) {
            if (sounds[type]) {
                sounds[type].currentTime = 0;
                sounds[type].play().catch(() => {}); // Ignore audio play errors
            }
        }

        // Dark mode toggle
        elements.darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            elements.darkToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') {
                const optionA = document.querySelector('.option[data-value="A"]');
                if (optionA && !isAnswered) optionA.click();
            } else if (e.key === 'b' || e.key === 'B') {
                const optionB = document.querySelector('.option[data-value="B"]');
                if (optionB && !isAnswered) optionB.click();
            } else if (e.key === 'ArrowRight') {
                document.getElementById('nextBtn').click();
            } else if (e.key === 'ArrowLeft') {
                document.getElementById('prevBtn').click();
            }
        });

        // Initialize the quiz
        initQuiz();
    </script>
</body>
</html>
